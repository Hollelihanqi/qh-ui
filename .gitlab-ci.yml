image: node:18

variables:
  CUSTOM_VERSION_FILE: 'packages/yto-custom/project.json'
  DEPLOY_SERVER: '10.130.136.69'
  DEPLOY_PATH: '/var/www/projects/webapp/yto-custom'

stages:
  - check_version
  - deploy_docs

check_version:
  stage: check_version
  script:
    - |
      # 获取当前分支最新的version
      CURRENT_VERSION=$(cat $CUSTOM_VERSION_FILE | grep -o '"version": "[^"]*"' | cut -d'"' -f4)

      # 获取上一次提交的version
      git checkout HEAD~1 $CUSTOM_VERSION_FILE
      PREVIOUS_VERSION=$(cat $CUSTOM_VERSION_FILE | grep -o '"version": "[^"]*"' | cut -d'"' -f4)
      git checkout HEAD $CUSTOM_VERSION_FILE

      # 如果版本发生变化，则触发文档部署
      if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
        echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
        echo "DEPLOY_DOCS=true" >> build.env
      else
        echo "Version unchanged"
        echo "DEPLOY_DOCS=false" >> build.env
      fi
  artifacts:
    reports:
      dotenv: build.env

deploy_docs:
  stage: deploy_docs
  rules:
    - if: $DEPLOY_DOCS == "true"
  before_script:
    # 设置 SSH 密钥
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - npm install -g pnpm
    - pnpm install
    - pnpm docs:build
    # 部署文档到内部服务器
    - rsync -avz --delete docs/.vitepress/dist/ $DEPLOY_USER@$DEPLOY_SERVER:$DEPLOY_PATH
  cache:
    paths:
      - node_modules/
      - .pnpm-store/
