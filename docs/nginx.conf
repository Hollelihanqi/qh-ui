server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # vitepress 产物：优先精确文件，其次目录，再用 .html 后缀兜底（兼容 /components/table 这类链接）
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 带 hash 的静态资源长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 不暴露部署配置（虽然在 ro 挂载里，能挡就挡）
    location = /docker-compose.yml { return 404; }
    location = /nginx.conf { return 404; }
    location ~ /\. {
        deny all;
    }
}
